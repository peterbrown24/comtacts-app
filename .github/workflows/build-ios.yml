name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Prepare signing credentials
        working-directory: artifacts/mobile
        run: |
          mkdir -p certs
          echo "${{ secrets.DIST_CERT_P12_BASE64 }}" | base64 -d > certs/dist.p12
          echo "${{ secrets.PROV_PROFILE_BASE64 }}" | base64 -d > certs/profile.mobileprovision
          sed -i "s/DIST_CERT_PASSWORD_PLACEHOLDER/${{ secrets.DIST_CERT_PASSWORD }}/" credentials.json

      - name: Build iOS
        working-directory: artifacts/mobile
        run: eas build --platform ios --profile production --non-interactive
        env:
          EAS_BUILD_NO_EXPO_GO_WARNING: true
