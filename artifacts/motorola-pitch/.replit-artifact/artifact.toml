kind = "slides"
previewPath = "/motorola-pitch/"
title = "Motorola Partnership Proposal"
version = "1.0.0"
id = "artifacts/motorola-pitch"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/motorola-pitch/" ]
localPort = 25543

[services.development]
run = "pnpm --filter @workspace/motorola-pitch run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/motorola-pitch", "run", "build" ]
publicDir = "artifacts/motorola-pitch/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25543"
BASE_PATH = "/motorola-pitch/"
